site_name: Seven Qualyteam Docs
site_description: Documentação técnica do SGQ/SGA da Seven Resíduos
site_author: ArcaGrowth1
site_url: https://arcagrowth1.github.io/seven-qualyteam-docs/
repo_name: ArcaGrowth1/seven-qualyteam-docs
repo_url: https://github.com/ArcaGrowth1/seven-qualyteam-docs
edit_uri: edit/main/

docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - pt
        - en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Início: index.md
  - Manual Funcional:
      - Visão geral: manual/index.md
      - Conceitos básicos:
          - Navegação geral: manual/0-conceitos/navegacao-geral.md
          - Listas (Consulta, Tarefas): manual/0-conceitos/lista-mestra.md
          - Filtros — o que filtram: manual/0-conceitos/filtros.md
          - Wizards (cadastros multi-passo): manual/0-conceitos/wizards.md
          - Anexar arquivos: manual/0-conceitos/anexos.md
          - Notificações (sino, e-mail): manual/0-conceitos/notificacoes.md
          - Busca global: manual/0-conceitos/busca.md
          - Permissões na prática: manual/0-conceitos/permissoes-na-pratica.md
      - Administrador:
          - Visão geral: manual/1-administrador/visao-geral.md
          - Processos: manual/1-administrador/processos.md
          - Unidades organizacionais: manual/1-administrador/unidades.md
          - Grupos de permissões: manual/1-administrador/grupos-permissoes.md
          - Campos personalizados: manual/1-administrador/campos-personalizados.md
          - Usuários: manual/1-administrador/usuarios.md
          - Registros de atividades: manual/1-administrador/audit-log.md
      - Documentos:
          - Visão geral: manual/2-documentos/visao-geral.md
          - Dashboard: manual/2-documentos/dashboard.md
          - Tarefas — Elaboração: manual/2-documentos/tarefas-elaboracao.md
          - Tarefas — Solicitação: manual/2-documentos/tarefas-solicitacao.md
          - Tarefas — Validade: manual/2-documentos/tarefas-validade.md
          - Cadastrar documento interno: manual/2-documentos/novo-documento-interno.md
          - Cadastrar documento externo: manual/2-documentos/novo-documento-externo.md
          - Consulta (lista mestra): manual/2-documentos/consulta.md
          - Detalhe do documento: manual/2-documentos/detalhe-documento.md
          - Controle de leitura obrigatória: manual/2-documentos/leitura-obrigatoria.md
      - Não Conformidades:
          - Visão geral: manual/3-nao-conformidades/visao-geral.md
          - Dashboard: manual/3-nao-conformidades/dashboard.md
          - Tarefas (6 abas): manual/3-nao-conformidades/tarefas.md
          - Registrar ocorrência: manual/3-nao-conformidades/registrar-ocorrencia.md
          - Registrar não conformidade (RNC): manual/3-nao-conformidades/registrar-rnc.md
          - Consulta: manual/3-nao-conformidades/consulta.md
          - Configuração do módulo: manual/3-nao-conformidades/configuracao.md
      - Oportunidades:
          - Visão geral: manual/4-oportunidades/visao-geral.md
          - Configuração inicial (matriz): manual/4-oportunidades/configuracao-inicial.md
          - Nova oportunidade: manual/4-oportunidades/nova-oportunidade.md
          - Tarefas e Consulta: manual/4-oportunidades/tarefas-e-consulta.md
      - Riscos:
          - Visão geral: manual/5-riscos/visao-geral.md
          - Configurar unidade: manual/5-riscos/configurar-unidade.md
          - Identificar risco: manual/5-riscos/identificar-risco.md
          - Dashboard, Tarefas e Consulta: manual/5-riscos/dashboard-tarefas-consulta.md
      - Fluxos completos:
          - Visão geral: manual/6-fluxos-completos/index.md
          - Implantação Seven (do zero): manual/6-fluxos-completos/implantacao-seven.md
  - Visão técnica: 00-overview.md
  - Arquitetura:
      - Contexto do sistema: 01-architecture/system-context.md
      - Containers: 01-architecture/container-diagram.md
      - Stack técnica: 01-architecture/tech-stack.md
      - Infraestrutura: 01-architecture/infrastructure.md
  - Domínio:
      - Glossário: 02-domain/glossary.md
      - Modelo de dados (ERD): 02-domain/erd.md
      - Permissões: 02-domain/permissions-matrix.md
      - Multi-tenancy: 02-domain/multi-tenancy.md
  - Módulos (técnico):
      - Template: 03-modules/_template.md
      - Administrador: 03-modules/admin/overview.md
      - Documentos: 03-modules/documents/overview.md
      - Não Conformidades: 03-modules/nonconformities/overview.md
      - Oportunidades: 03-modules/opportunities/overview.md
      - Riscos: 03-modules/risks/overview.md
  - Cross-cutting:
      - Autenticação: 04-cross-cutting/auth.md
      - Audit Log: 04-cross-cutting/audit-log.md
      - Notificações: 04-cross-cutting/notifications.md
      - Storage de arquivos: 04-cross-cutting/file-storage.md
      - i18n: 04-cross-cutting/i18n.md
  - Design System:
      - Componentes: 05-design-system/components.md
      - Patterns: 05-design-system/patterns.md
      - Tokens: 05-design-system/tokens.md
  - Roadmap:
      - MVP: 06-roadmap/mvp.md
      - Fase 2: 06-roadmap/phase-2.md
      - ADRs:
          - Template: 06-roadmap/adrs/_template.md
          - "0001 — Multi-tenancy": 06-roadmap/adrs/0001-multi-tenancy.md
          - "0002 — Monolith vs Microservices": 06-roadmap/adrs/0002-monolith-vs-microservices.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ArcaGrowth1/seven-qualyteam-docs
